{% extends 'django_spire/page/full_page.html' %}

{% block full_page_content %}
    <form method="post">
        {% csrf_token %}
        {{ form_description }}
        {{ form }}
        <button type="submit" class="btn btn-primary">Delete</button>
        <a class="btn btn-primary" href="{% url 'django_spire:metric:domain:page:detail' pk=domain_pk %}">Cancel</a>
    </form>
{% endblock %}
