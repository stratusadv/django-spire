{% extends 'django_spire/page/full_page.html' %}

{% block full_page_content %}
    <form method="post">
        {% csrf_token %}
        {{ form_description }}
        {{ form }}
        <button type="submit">Delete</button>
        <a href="{% url 'django_spire:metric:domain:page:subdomain_list' domain_pk=domain_pk %}">Cancel</a>
    </form>
{% endblock %}
