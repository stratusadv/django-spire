<div
    x-data="{
        async init() {
            await this.visual.get()
        },
        visual: new ModelObjectGlue('visual')
    }"
>

    <div class="row g-3 mb-3">
        <div class="col-12">
            {% include 'django_spire/glue/form/field/char_field.html' with glue_model_field='visual.name' %}
        </div>

        <div class="col-12">
            {% include 'django_spire/glue/form/field/text_field.html' with glue_model_field='visual.description' %}
        </div>
    </div>
</div>

{% include 'django_spire/form/button/submit_button.html' %}
