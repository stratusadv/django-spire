{% load django_spire_session_tags %}

<form method="get">
    <div class="mb-3">
        <div
            class="row g-2 mb-2"
            x-data="{
                async init() {
                    this.search_field.set_attribute('placeholder', 'Search...')
                },

                session_controller: new SessionController('{% session_controller_to_json filter_session.session_key %}'),
                search_field: new GlueCharField(
                    'search',
                    {
                        value: '{{ filter_session.search|default:"" }}',
                        label: 'Search',
                        name: 'search',
                    }
                ),
            }"
        >
            <div class="col-3">
                {% include 'django_spire/glue/form/field/char_field.html' with glue_field='search_field' %}
            </div>
        </div>
    </div>
</form>
