<div
    x-data="{
        async init() {
            await this.signage.get()
        },
        signage: new ModelObjectGlue('signage')
    }"
>

    <div class="row g-3 mb-3">
        <div class="col-12">
            {% include 'django_spire/glue/form/field/char_field.html' with glue_model_field='signage.name' %}
        </div>

        <div class="col-12">
            {% include 'django_spire/glue/form/field/text_field.html' with glue_model_field='signage.description' %}
        </div>
    </div>
</div>

{% include 'django_spire/form/button/submit_button.html' %}
