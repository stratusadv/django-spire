{% extends 'django_spire/dropdown/ellipsis_dropdown.html' %}

{% block dropdown_content %}
    {% if AuthController.knowledge.can_change %}
        <li>
            <a class="dropdown-item d-flex align-items-center gap-2" x-on:click.prevent="location.href = entry.edit_url">
                <i class="bi bi-input-cursor-text"></i>Rename
            </a>
        </li>
        <li>
            <a class="dropdown-item d-flex align-items-center gap-2" x-on:click.prevent="location.href = entry.edit_version_url">
                <i class="bi bi-pencil"></i>Edit
            </a>
        </li>
    {% endif %}
    {% if AuthController.knowledge.can_delete %}
        <li>
            <a class="dropdown-item d-flex align-items-center gap-2 text-app-danger" x-on:click.prevent="location.href = entry.delete_url">
                <i class="bi bi-trash3"></i>Delete
            </a>
        </li>
    {% endif %}
{% endblock %}
