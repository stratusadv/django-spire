{% extends 'django_spire/knowledge/page/full_page.html' %}

{% block knowledge_full_page_content %}
    <form method="post">
        {% csrf_token %}
        <div class="row mb-3">
            <div class="col-12">
                {% include 'django_spire/form/field/field.html' with field=form.name %}
            </div>
        </div>
        <div class="row">
            <div class="col-12">
                {% include 'django_spire/form/button/submit_button.html' %}
            </div>
        </div>
    </form>
{% endblock %}
