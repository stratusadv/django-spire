{% if status == 'published' %}
    <span class="badge bg-success text-white py-2 px-3">Published</span>
{% endif %}

{% if status == 'draft' %}
    <span class="badge bg-warning text-white py-2 px-3">Draft</span>
{% endif %}

{% if status == 'archived' %}
    <span class="badge bg-secondary text-white py-2 px-3">Archived</span>
{% endif %}
