{% extends 'django_spire/item/item.html' %}

{% block item_title_col %}8{% endblock %}

{% block item_title %}
    <span class="spinner-border spinner-border-sm me-2" role="status">
        <span class="visually-hidden">Loading...</span>
    </span>
	<span x-text="file_json.name"></span>
{% endblock %}

{% block item_row_content %}
	<div class="col">
        <div class="attribute-label">Type</div>
        <span x-text="file_json.type"></span>
    </div>
	<div class="col">
        <div class="attribute-label">Size</div>
        <span x-text="file_json.size"></span>
    </div>
{% endblock %}
