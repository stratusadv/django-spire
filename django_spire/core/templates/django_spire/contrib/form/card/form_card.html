{% extends 'django_spire/card/card.html' %}

{% block card_content %}
    <div class="card-title">
        {% if form_title %}
            {{ form_title }}
        {% elif page_title %}
            {{ page_title }}
        {% endif %}
    </div>
    <div class="card-text">
        {% if form_description %}
            <div class="mb-3">
                {{ form_description }}
            </div>
        {% endif %}

        {{ form }}
    </div>
{% endblock %}
