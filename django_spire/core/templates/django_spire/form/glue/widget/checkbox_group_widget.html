{% extends "django_spire/glue/form/widget/widget.html" %}

{% block widget_content %}
    {% include 'django_spire/glue/form/label/label.html' %}
    <div class="border rounded p-3{% if input_class %} {{ input_class }}{% endif %}" {% if max_height %}style="max-height: {{ max_height }}; overflow-y: auto;"{% endif %}>
        <div class="row">
            <template x-for="choice in glue_field?.choices || []" :key="choice[0]">
                <div class="col-md-{{ columns|default:'4' }} col-lg-{{ columns|default:'4' }}">
                    <div class="form-check">
                        <input
                            type="checkbox"
                            class="form-check-input"
                            :id="{{ glue_field }}.id + '-' + choice[0]"
                            :value="choice[0]"
                            :checked="value && value.includes(choice[0])"
                            @change="
                                if ($event.target.checked) {
                                    value = [...(value || []), choice[0]];
                                } else {
                                    value = (value || []).filter(v => v !== choice[0]);
                                }
                            "
                            :disabled="{{ glue_field }}.disabled">
                        <label class="form-check-label" :for="{{ glue_field }}.id + '-' + choice[0]" x-text="choice[1]"></label>
                    </div>
                </div>
            </template>
        </div>
    </div>
    {{ block.super }}
{% endblock %}
