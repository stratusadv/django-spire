<div
    x-data="{
        loading: false,
    }"
>
    <button
        type="submit"
        class="btn btn-primary {{ button_class }}"
        x-show="!loading"
        @click.prevent="submit_form($el.form)"
    >
        {% if button_text %}
            {{ button_text }}
        {% else %}
            Submit
        {% endif %}
    </button>
    <button
        type="button"
        class="btn btn-primary {{ button_class }}"
        x-show="loading"
        disabled
    >
        <span class="spinner-border spinner-border-sm me-1"></span>
        Loading...
    </button>
</div>
