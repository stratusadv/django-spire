<div
    x-data="{
        loading: false,

        async submit_form(form) {
            if (form.checkValidity() && await this.$validation?.() !== false) {
                this.loading = true;
                try {
                    form.submit();
                } finally {
                    this.loading = false;
                }
            } else {
                form.reportValidity();
            }
        }
    }"
>
    <button
        type="submit"
        class="btn btn-primary {{ button_class }}"
        x-show="!loading"
        @click.prevent="submit_form($el.form)"
    >
        {% if button_text %}
            {{ button_text }}
        {% else %}
            Submit
        {% endif %}
    </button>
    <button
        type="button"
        class="btn btn-primary {{ button_class }}"
        x-show="loading"
        disabled
    >
        <span class="spinner-border spinner-border-sm me-1"></span>
        Loading...
    </button>
</div>
