<li>
    <button
        :id="$id('tab', which_tab($el.parentElement, $refs.tablist))"
        @click="select($el.id)"
        @focus="select($el.id)"
        type="button"
        role="tab"
        class="bg-transparent h-100 position-relative px-3 text-nowrap d-flex align-items-center gap-2"
        :class="is_selected($el.id) ? 'tab-item text-app-default-link-color' : 'text-app-secondary'"
        style="border: none;"
    >
        {% if trigger_icon %}
            <i class="{{ trigger_icon }}"></i>
        {% endif %}
        {{ trigger_title }}
    </button>
</li>
