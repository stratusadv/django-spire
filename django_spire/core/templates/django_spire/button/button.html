<a
        class="btn btn-sm {% block button_class %}{% endblock %} {{ button_class }}"
        {{ button_attributes }}
        {% if button_href %}href="{{ button_href }}{{ button_url_params }}"{% endif %}
>
    {% if button_icon %}
        <i class="{{ button_icon }}"></i>
    {% endif %}

    {{ button_text }}

</a>
