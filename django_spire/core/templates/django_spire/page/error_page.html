{% extends 'django_spire/base/base.html' %}

{% block base_body_content %}

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8 text-center">
                <h1 class="display-1 fw-bold text-danger">{{ error_code|default:"500" }}</h1>
                <h2 class="mb-3">{{ heading|default:"Something Went Wrong" }}</h2>
                <p class="text-muted">{{ subheading|default:"An unexpected error occurred." }}</p>
                <a href="/" class="btn btn-primary mt-3">Return Home</a>
            </div>
        </div>
    </div>

{% endblock %}
