<div x-data="{
        show_accordion: false,
        toggle() {
            this.show_accordion = !this.show_accordion
        }
    }"
>
    <div @click="toggle()" class="cursor-pointer text-primary">
        {% block accordion_toggle %}
            <div
                    class="d-flex align-items-center gap-2 rounded-3 px-3 cursor-pointer text-link-side-navigation ds-fs-9"
                    :class="{
            'justify-content-center px-0 gap-0 py-1': collapsed,
            'gap-2 px-3 py-2': !collapsed
        }"
            >
                <i class="{% block nav_icon %}{% endblock %} flex-shrink-0" style="width: 1.25rem;"
                   :style="collapsed ? 'font-size: 1.25rem; width: auto;' : 'width: 1.25rem;'"></i>

                <span class="text-truncate" x-show="!collapsed">
                    {% block nav_title %}
                    {% endblock %}
                </span>

                <span
                        class="ms-auto small text-secondary"
                        :class="{'bi bi-chevron-right': !show_accordion, 'bi bi-chevron-down': show_accordion}"
                        x-show="!collapsed"
                >
                </span>
            </div>
        {% endblock %}
    </div>

    {% block accordion_child_toggle %}
        {# Used if accordion is toggled by a child component. Must call toggle() #}
    {% endblock %}

    <div
            x-cloak
            x-show="show_accordion"
            x-transition
    >
        {% block accordion_content %}
            <div
                    class="mb-2 mt-1 border-start border-secondary border-1"
                    :class="collapsed ? 'ms-2' : 'ms-4'"
                    @accordion-link="accordion_paths.push($event.detail.url_path); check_path()"
                    x-data="{
            accordion_paths: [],
            current_path: '{{ request.path }}',
            check_path() {
                if (this.accordion_paths.includes(this.current_path)) {
                    this.show_accordion = true
                }
            }
        }"
            >
                <div class="d-flex flex-column gap-1 ps-2">
                    {% block accordion_links %}
                    {% endblock %}
                </div>
            </div>
        {% endblock %}
    </div>
</div>
