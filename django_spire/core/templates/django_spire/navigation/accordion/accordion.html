<div
    class="{% block accordion_root_class %}{% endblock %}"
    x-data="{
        show_accordion: $el.classList.contains('side-nav-accordion-open'),

        toggle() {
            this.show_accordion = !this.show_accordion
            this.$root.classList.toggle('side-nav-accordion-open', this.show_accordion)
        }
    }"
>
    <div @click="toggle()" class="cursor-pointer text-primary">
        {% block accordion_toggle %}
            <div class="d-flex align-items-center gap-2 rounded-3 px-3 py-2 cursor-pointer text-link-side-navigation ds-fs-9">
                <i class="{% block nav_icon %}{% endblock %} flex-shrink-0" style="width: 1.25rem;"></i>

                <span class="text-truncate side-nav-expanded-only">
                    {% block nav_title %}
                    {% endblock %}
                </span>

                <i class="bi bi-chevron-right ms-auto small text-secondary side-nav-expanded-only side-nav-accordion-chevron-closed"></i>
                <i class="bi bi-chevron-down ms-auto small text-secondary side-nav-expanded-only side-nav-accordion-chevron-open"></i>
            </div>
        {% endblock %}
    </div>

    {% block accordion_child_toggle %}
        {# Used if accordion is toggled by a child component. Must call toggle() #}
    {% endblock %}

    <div
            class="side-nav-accordion-content"
            x-show="show_accordion"
            x-transition
    >
        {% block accordion_content %}
            <div class="mb-2 mt-1 border-start border-secondary border-1 ms-4 side-nav-accordion-indent">
                <div class="d-flex flex-column gap-1 ps-2">
                    {% block accordion_links %}
                    {% endblock %}
                </div>
            </div>
        {% endblock %}
    </div>
</div>
