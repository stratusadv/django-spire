{% extends 'django_spire/card/card.html' %}

{% block card_content %}
    <div class="card-header">
        <div class="row">
            <div class="col card-title">
                {% block card_title %}{% endblock %}
            </div>
            <div class="col-auto text-end">
                {% block card_button %}{% endblock %}
            </div>
        </div>
    </div>
    <div class="card-body">
        {% block card_title_content %}{% endblock %}
    </div>
{% endblock %}
