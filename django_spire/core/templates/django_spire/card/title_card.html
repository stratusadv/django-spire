<div class="card">

    <div class="card-header">
        <div class="row">
            <div class="col card-title">
                {% block card_title %}{% endblock %}
            </div>
            <div class="col-auto">
                {% block card_button %}{% endblock %}
            </div>
        </div>
    </div>

    {% block card_title_content %}
        <div class="card-body">
            {% block card_title_body %}
            {% endblock %}
        </div>
    {% endblock %}

</div>
