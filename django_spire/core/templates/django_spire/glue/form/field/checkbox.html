{% extends "django_spire/glue/form/field/field_base.html" %}

{% block field_content %}
    <div class="form-check{% if input_class %} {{ input_class }}{% endif %}">
        <input
            type="checkbox"
            class="form-check-input"
            :id="{{ glue_field }}.id"
            {% include 'django_spire/glue/form/field/base_input_attributes.html' with exclude_class=True %}>
        {{ block.super }}
    </div>
{% endblock %}
