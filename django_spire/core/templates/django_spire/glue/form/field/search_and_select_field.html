{% extends 'django_spire/glue/form/field/../widget/base_widget.html' %}

{% block field_content %}
    {% include 'django_spire/glue/form/field/../label/label.html' %}
    <div
        class="position-relative"
        x-data="{
            show_dropdown: false,
            search_query: '',
            filtered_choices: [],

            init() {
                this.update_filtered_choices();
                $watch('search_query', () => this.update_filtered_choices());
                $watch('{{ glue_field }}.choices', () => this.update_filtered_choices());
            },

            update_filtered_choices() {
                let query = this.search_query.toLowerCase();
                this.filtered_choices = (this.glue_field?.choices || []).filter(
                    choice => String(choice[1]).toLowerCase().includes(query) || String(choice[0]).toLowerCase().includes(query)
                );
            },

            select_item(choice) {
                if ({{ glue_field }}.disabled_choices.includes(choice[0])) return;
                value = choice[0];
                this.show_dropdown = false;
                this.search_query = '';
            }
        }"
    >
        <div class="position-relative">
            <input
                type="text"
                class="form-control"
                x-model="search_query"
                @focus="show_dropdown = true"
                @keydown.escape="show_dropdown = false; search_query = ''"
                placeholder="{% block search_placeholder %}Search...{% endblock %}"
            >
            <div
                x-cloak
                x-show="show_dropdown && filtered_choices.length > 0"
                @click.outside="show_dropdown = false"
                class="shadow border rounded-2 mt-1 position-absolute w-100 list-group"
                style="max-height: 250px; overflow-y: auto; z-index: 4;"
            >
                <template x-for="choice in filtered_choices" :key="choice[0]">
                    <div
                        class="py-2 px-3 list-group-item cursor-pointer"
                        :class="{{ glue_field }}.disabled_choices.includes(choice[0]) ? 'opacity-50' : ''"
                        @click="select_item(choice)"
                    >
                        <div x-text="choice[1]"></div>
                        <small class="text-muted" x-text="choice[0]"></small>
                    </div>
                </template>
                <template x-if="filtered_choices.length === 0 && search_query.length > 0">
                    <div class="py-3 px-3 text-center text-muted">
                        No results found
                    </div>
                </template>
            </div>
        </div>
    </div>
{% endblock %}
