{% extends "django_spire/glue/form/field_base.html" %}

{% block field_content %}
    {% include 'django_spire/glue/form/label.html' %}
    <input
        type="{% block input_type %}{{ type|default:'text' }}{% endblock %}"
        {% include 'django_spire/glue/form/base_input_attributes.html' %}
        :maxlength="{{ obj }}.$form.$fields.{{ field }}?.max_length"
        :minlength="{{ obj }}.$form.$fields.{{ field }}?.min_length"
        placeholder="{% block placeholder %}{{ placeholder }}{% endblock %}">
    {{ block.super }}
{% endblock %}
