{% extends "django_spire/glue/form/widget/widget.html" %}
{% load django_spire_glue %}

{% block widget_content %}
    <div class="form-check {% if input_class %}{{ input_class }}{% endif %}">
        <input
            type="checkbox"
            class="form-check-input"
            :id="{{ glue_field|glue_field_metadata_path }}.id"
            {% include 'django_spire/glue/form/widget/attributes/input_attributes.html' with exclude_class=True %}>
        {{ block.super }}
    </div>
{% endblock %}
