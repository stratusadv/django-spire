{% extends "django_spire/glue/form/field/field_base.html" %}

{% block field_content %}
    {% include 'django_spire/glue/form/field/../label/label.html' %}
    <input
        type="{% block input_type %}{{ type|default:'text' }}{% endblock %}"
        {% include 'django_spire/glue/form/field/base_input_attributes.html' %}
        :maxlength="{{ glue_field }}?.max_length"
        :minlength="{{ glue_field }}?.min_length"
        placeholder="{% block placeholder %}{{ placeholder }}{% endblock %}">
    {{ block.super }}
{% endblock %}
