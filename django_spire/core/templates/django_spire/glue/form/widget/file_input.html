{% extends "django_spire/glue/form/field/field_base.html" %}

{% block field_content %}
    <div x-data="{ _filePreview: null }">
        {% include 'django_spire/glue/form/field/../label/label.html' %}
        {% if not hide_preview %}
        <div class="mb-2" x-show="!!_filePreview || !!glue_field?.url">
            <img :src="_filePreview ?? glue_field?.url" alt="" class="img-fluid rounded" style="max-height: {{ max_preview_height|default:'200px' }};">
        </div>
        {% endif %}
        <input
            type="file"
            {% include 'django_spire/glue/form/field/base_input_attributes.html' with exclude_x_model=True %}
            {% if accept %}accept="{{ accept }}"{% endif %}
            @change="
                const file = $event.target.files[0];
                if (file) {
                    value = file;
                    {% if not hide_preview %}
                    const reader = new FileReader();
                    reader.onload = (e) => { _filePreview = e.target.result; };
                    reader.readAsDataURL(file);
                    {% endif %}
                }
            "
        >
    </div>
{% endblock %}
