<div>
    {% if not hide_label %}
        {% block widget_label %}
            {% include 'django_spire/glue/form/label/label.html' %}
        {% endblock %}
    {% endif %}

    {% block widget_content %}
    {% endblock %}
    <div class="invalid-feedback" x-text="{{ glue_field }}.errorText"></div>
    <small class="text-muted d-block" x-show="{{ glue_field }}.help_text" x-text="{{ glue_field }}.help_text"></small>
</div>
