{% extends "django_spire/glue/form/field_base.html" %}

{% block field_content %}
    <div class="form-check{% if input_class %} {{ input_class }}{% endif %}">
        <input
            type="checkbox"
            class="form-check-input"
            :id="'{{ field }}-' + ({{ obj }}.$key || 'single')"
            {% include 'django_spire/glue/form/base_input_attributes.html' with exclude_class=True %}>
        {{ block.super }}
    </div>
    <small class="text-muted" x-show="{{ obj }}.$form.$fields.{{ field }}?.help_text" x-text="{{ obj }}.$form.$fields.{{ field }}?.help_text"></small>
{% endblock %}
