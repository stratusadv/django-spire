<div
        x-data="{
            searchQuery: '',
            sliceStart: 0,
            sliceStop: 20,
            orderBy: 'name',
            items: Glue.querySet.{% block scroll_queryset_unique_name %}{% endblock %},
            get queryParams() {
                return {
                    filter: {name__icontains: this.searchQuery},
                    slice: {start: this.sliceStart, stop: this.sliceStop},
                    order_by: this.orderBy,
                };
            },
            toggleOrder() {
                this.orderBy = this.orderBy === 'name' ? '-name' : 'name'
            },
            incrementSlice() {
                this.sliceStop += 20
            }
        }"
        class=""
>

    <div class="row">
        <div class="col">
            {% block scroll_header %}
            {% endblock %}
        </div>
    </div>

    <div class="row">
        <div class="col">

            <template x-for="item in items.queryWithParams(queryParams)">
                {% block scroll_template_item %}
                {% endblock %}
            </template>

            <div
                    x-data="{
                        init() {
                            const observer = new IntersectionObserver((entries) => {entries.forEach(entry => {
                                    if (entry.isIntersecting) {
                                        incrementSlice()
                                    }
                                })}, { threshold: 0 })
                            observer.observe($el)
                        }
                    }"
                    style=" height: 50vh; margin-top: -50vh; pointer-events: none; "
            >
            </div>

        </div>
    </div>

</div>
