<li>
    <a
        class="dropdown-item d-flex align-items-center gap-2 {{ link_css|default:'' }}"
        href="{{ link_url }}"
        {% if x_link_url %}x-on:click.prevent="location.href = {{ x_link_url }}"{% endif %}
        {% if x_click %}{{ x_click }}{% endif %}
    >
        {% if link_icon %}<i class="{{ link_icon }}"></i>{% endif %}
        {% block link_content %}{{ link_text }}{% endblock %}
    </a>
</li>
