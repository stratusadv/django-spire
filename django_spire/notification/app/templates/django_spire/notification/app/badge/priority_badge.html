{% if app_notification.notification.priority == priorities.LOW %}
    <span class="badge bg-secondary text-white">Low</span>
{% elif app_notification.notification.priority == priorities.MEDIUM %}
    <span class="badge bg-warning text-white">Med</span>
{% elif app_notification.notification.priority == priorities.HIGH %}
    <span class="badge bg-danger text-white">High</span>
{% endif %}
