<div
    x-data="{
        reload_tasks() {
            let task_toast_list_view = Glue.view(`{% url 'django_spire:celery:task:toast_list' %}`)
            task_toast_list_view.renderInnerHtml($el, {django_spire_celery_task_key_pairs: '{{ django_spire_celery_task_key_pairs }}' })
        },
        init() {
            this.reload_tasks()
        }
    }"
    class="toast-container position-absolute end-0 bottom-0 px-3"
    @django_spire_celery_reload_tasks.window="reload_tasks()"
>
</div>
