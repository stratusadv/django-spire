<div
    x-data="{
        reload_task_toast_widget() {
            let task_toast_list_view = new ViewGlue(`{% url 'django_spire:celery:task:toast_list' django_spire_celery_task_reference_key %}`)
            task_toast_list_view.render_inner($el, {})
        },
        init() {
            this.reload_task_toast_widget()
        }
    }"
    class="toast-container position-absolute end-0 bottom-0 px-3"
    @django_spire_celery_reload_task_toast_widget.window="reload_task_toast_widget()"
>
</div>
