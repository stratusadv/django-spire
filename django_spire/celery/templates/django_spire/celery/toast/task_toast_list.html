{% if celery_tasks %}
    {% for celery_task in celery_tasks %}
        <div
            x-data="{
            reload_task() {
                let task_toast_view = new ViewGlue(`{% url 'django_spire:celery:task:toast' celery_task.task_id %}`)
                task_toast_view.render_inner($el, {})
            },
        }"
            class="toast show mb-3 bg-app-layer-two shadow-sm border-0"
            role="alert"
            aria-live="assertive"
            aria-atomic="true"
        >
            {% include 'django_spire/celery/toast/task_toast.html' %}
        </div>
    {% endfor %}
{% endif %}
