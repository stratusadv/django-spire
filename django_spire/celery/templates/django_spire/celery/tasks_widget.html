<div
    x-data="{
        reload_task_widget() {
            let widget_view = new ViewGlue(`/django_spire/celery/task/list/{{ celery_task_reference_key }}/`)
            widget_view.render_inner($el, {})
        },
        init() {
            this.reload_task_widget()
        }
    }"
    class="toast-container position-absolute end-0 bottom-0 px-3"
    @celery_reload_task_widget.window="reload_task_widget()"
>
</div>
