<div x-data="{
        reload_task_widget() {
            let widget_view = new ViewGlue(`/django_spire/celery/task/list/{{ celery_task_object_hash }}/`)
            widget_view.render_inner(this.$refs.widget_div, {})
        },
        init() {
            this.reload_task_widget()
        }
    }"
    class="row w-100 border border-danger">
    <div x-ref="widget_div" class="col">
        NOT LOADED
    </div>
</div>
