<div
    x-data="{
        reload_tasks() {
            let task_toast_list_view = new ViewGlue(`{% url 'django_spire:celery:task:item_list' %}?show_all=True`)
            task_toast_list_view.render_inner($el, {django_spire_celery_task_key_pairs: '{{ django_spire_celery_task_key_pairs }}' })
        },
        init() {
            this.reload_tasks()
        }
    }"
    class="p-0 m-0"
    @django_spire_celery_reload_tasks.window="reload_tasks()"
>
</div>
