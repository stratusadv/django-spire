<div
    class="text-center"
    x-data="{
        async delete_chat() {
            let response = await Glue.fetch(
                '{% url "django_spire:ai:chat:json:delete" pk=chat.pk %}',
            )

            let type = response.type
            if (type === 'success') {
                close_modal()
                $dispatch('deleted_chat', {{ chat.pk }})
            }
            $dispatch('notify', {'type': type, 'message': response.message})
        }
    }"
>
    Are you sure you want to delete chat {{ chat }}?<br>
    <div class="d-inline-block mt-2">
        {% include 'django_spire/button/button.html' with button_class='btn-app-danger' button_text='Delete' x_button_click="delete_chat()" %}
    </div>
</div>
