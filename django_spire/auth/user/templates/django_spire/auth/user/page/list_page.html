{% extends 'django_spire/page/full_page.html' %}

{% block full_page_content %}
    <ul class="nav nav-tabs" id="userListTab" role="tablist">
        <li class="nav-item" role="presentation">
            <button class="nav-link active" id="active-users-tab" data-bs-toggle="tab" data-bs-target="#active-users-tab-pane"
                    type="button" role="tab" aria-controls="active-users-tab-pane" aria-selected="true">Active
            </button>
        </li>
        <li class="nav-item" role="presentation">
            <button class="nav-link" id="inactive-users-tab" data-bs-toggle="tab" data-bs-target="#inactive-users-tab-pane"
                    type="button" role="tab" aria-controls="inactive-users-tab-pane" aria-selected="false">Inactive
            </button>
        </li>
    </ul>
    <div class="tab-content" id="userListTabContent">
        <div class="tab-pane fade show active" id="active-users-tab-pane" role="tabpanel" aria-labelledby="active-users-tab"
             tabindex="0">
            {% include 'django_spire/auth/user/card/list_card.html' with user_list=active_user_list %}

        </div>
        <div class="tab-pane fade" id="inactive-users-tab-pane" role="tabpanel" aria-labelledby="inactive-users-tab" tabindex="0">
            {% include 'django_spire/auth/user/card/list_card.html' with user_list=inactive_user_list %}
        </div>
    </div>
{% endblock %}
