<div
    x-data="{
        current_permission: '{{ perm_data.level_verbose }}',
        loading: false,
        error_message: '',

        async update(perm) {
            this.error_message = null

            if(this.current_permission !== perm) {
                this.loading = true
                let response = await Spire.ajax.request(
                    'POST',
                    '{% url "django_spire:auth:group:json:group_permission_ajax" app_name=perm_data.app_name pk=group.pk %}',
                    {'perm_level': perm}
                )
                this.loading = false
                let status = response.data.status
                if (status === 200){
                    this.current_permission = perm
                } else {
                    this.error_message = response.data.message
                }
            }
        }
    }"
>
    <div class="dropdown">
        <button
            class="btn btn-sm border dropdown-toggle"
            type="button"
            data-bs-toggle="dropdown"
            :disabled="loading"
        >
            <span x-text="current_permission"></span>
        </button>
        <ul class="dropdown-menu">
            <li>
                <a class="dropdown-item" :class="{ 'active': current_permission === 'None', 'text-muted': current_permission === 'None' }" href="#" @click.prevent="update('None')">None</a>
            </li>
            <li>
                <a class="dropdown-item" :class="{ 'active': current_permission === 'View', 'text-muted': current_permission === 'View' }" href="#" @click.prevent="update('View')">View</a>
            </li>
            <li>
                <a class="dropdown-item" :class="{ 'active': current_permission === 'Add', 'text-muted': current_permission === 'Add' }" href="#" @click.prevent="update('Add')">Add</a>
            </li>
            <li>
                <a class="dropdown-item" :class="{ 'active': current_permission === 'Change', 'text-muted': current_permission === 'Change' }" href="#" @click.prevent="update('Change')">Change</a>
            </li>
            <li>
                <a class="dropdown-item" :class="{ 'active': current_permission === 'Delete', 'text-muted': current_permission === 'Delete' }" href="#" @click.prevent="update('Delete')">Delete</a>
            </li>
        </ul>
    </div>
    <template x-if="error_message">
        <div x-text="error_message" class="fs--1 text-danger"></div>
    </template>
</div>
