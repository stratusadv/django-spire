<div
    x-data="{
        has_access: '{{ special_role.has_access }}' === 'True',
        get has_access_verbose() { return this.has_access ? 'Yes' : 'No' },
        codename: '{{ special_role.codename }}',
        loading: false,
        error_message: '',

        async update(perm) {
            this.error_message = null
            this.loading = true
            let response = await Spire.ajax.request(
                'POST',
                '{% url "django_spire:auth:group:json:group_special_role_ajax" app_name=perm_data.app_name pk=group.pk %}',
                {
                'codename': this.codename,
                'grant_special_role_access': perm === 'Yes'
                }
            )
            this.loading = false
            let status = response.data.status
            if (status === 200){
                this.has_access = perm === 'Yes'
            } else {
                this.error_message = response.data.message
            }
        }
    }"
>
    <div class="dropdown">
        <button
            class="btn btn-sm btn-outline-primary dropdown-toggle"
            type="button"
            data-bs-toggle="dropdown"
            :disabled="loading"
        >
            <span x-text="has_access_verbose"></span>
        </button>
        <ul class="dropdown-menu">
            <li>
                <a class="dropdown-item" :class="{ 'active': has_access_verbose === 'No', 'text-muted': has_access_verbose === 'No' }" href="#" @click.prevent="update('No')">No</a>
            </li>
            <li>
                <a class="dropdown-item" :class="{ 'active': has_access_verbose === 'Yes', 'text-muted': has_access_verbose === 'Yes' }" href="#" @click.prevent="update('Yes')">Yes</a>
            </li>
        </ul>
    </div>
    <template x-if="error_message">
        <div x-text="error_message" class="fs--1 text-danger"></div>
    </template>
</div>
