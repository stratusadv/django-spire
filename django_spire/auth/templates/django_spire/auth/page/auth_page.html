{% extends 'django_spire/page/page.html' %}

{% load static %}

{% block page_content %}
    <div class="row justify-content-center mx-auto mt-6">
        <div class="col-11 col-md-6 col-lg-4 card">
            <div class="px-4 py-4">
                {% block authentication_page_top_content %}
                    <div class="text-center pb-3">
                        {% block authentication_page_img %}
                            <img height="120px" class="ms-1"
                                 src="{% static 'django_spire/img/django-spire-logo-256.png' %}"
                                 alt="">
                            <h3 class="pt-3 text-decoration-none text-dark">Django Spire Test Project</h3>
                        {% endblock %}
                    </div>
                {% endblock %}
                {% block authentication_page_content %}

                {% endblock %}
            </div>
        </div>
    </div>
{% endblock %}
