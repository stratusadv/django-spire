{% if ticket.priority == 'low'  %}
    <span class="badge bg-secondary text-white">{{ ticket.get_priority_display }}</span>
{% elif ticket.priority == 'med' %}
    <span class="badge bg-primary text-white">{{ ticket.get_priority_display }}</span>
{% elif ticket.priority == 'high' %}
    <span class="badge bg-warning text-white">{{ ticket.get_priority_display }}</span>
{% elif ticket.priority == 'urge' %}
    <span class="badge bg-danger text-white">{{ ticket.get_priority_display }}</span>
{% endif %}
