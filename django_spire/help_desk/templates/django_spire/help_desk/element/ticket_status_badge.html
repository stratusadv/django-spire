{% if ticket.status == 'read'  %}
    <span class="badge bg-secondary text-white">{{ ticket.get_status_display }}</span>
{% elif ticket.status == 'prog' %}
    <span class="badge bg-primary text-white">{{ ticket.get_status_display }}</span>
{% elif ticket.status == 'done' %}
    <span class="badge bg-success text-white">{{ ticket.get_status_display }}</span>
{% endif %}
