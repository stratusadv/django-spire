{% if type == types.APP %}
    <span class="badge bg-warning text-white">App</span>
{% elif type == types.EMAIL %}
    <span class="badge bg-success text-white">Email</span>
{% elif type == types.SMS %}
    <span class="badge bg-danger text-white">Sms</span>
{% elif type == types.PUSH %}
    <span class="badge bg-primary text-white">Push</span>
{% endif %}
