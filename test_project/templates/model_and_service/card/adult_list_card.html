{% extends 'django_spire/card/title_card.html' %}

{% block card_title %}
	Adults
{% endblock %}

{% block card_title_content %}
    <div class="card-body">
        {% for adult in adults %}
            <div class="row">
                <div class="col">{{ adult.get_full_name }}</div>
            </div>
        {% empty %}
            {% include 'django_spire/item/no_data_item.html' %}
        {% endfor %}
    </div>
{% endblock %}
