{% if task.status == 'new' %}
    <span class="badge bg-primary text-white">New</span>
{% elif task.status == 'inp' %}
    <span class="badge bg-secondary text-white">In Progress</span>
{% elif task.status == 'com' %}
    <span class="badge bg-success text-white">Complete</span>
{% elif task.status == 'can' %}
    <span class="badge bg-warning text-white">Cancelled</span>
{% endif %}
