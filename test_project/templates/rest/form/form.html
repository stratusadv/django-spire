<div class="row g-2">
    <div class="col-12">
        <label class="form-label" for="id_first_name">First Name</label>
        <input
            class="form-control"
            id="id_first_name"
            name="first_name"
            placeholder="Enter first name"
            type="text"
            x-model="pirate.firstName"
        >
    </div>
    <div class="col-12">
        <label class="form-label" for="id_last_name">Last Name</label>
        <input
            class="form-control"
            id="id_last_name"
            name="last_name"
            placeholder="Enter last name"
            type="text"
            x-model="pirate.lastName"
        >
    </div>
    <div class="col-12">
        <label class="form-label" for="id_email">Email</label>
        <input
            class="form-control"
            id="id_email"
            name="email"
            placeholder="Enter email address"
            type="email"
            x-model="pirate.email"
        >
    </div>
    <div class="col-12">
        <label class="form-label" for="id_username">Username</label>
        <input
            class="form-control"
            id="id_username"
            name="username"
            placeholder="Choose a username"
            type="text"
            x-model="pirate.username"
        >
    </div>
    <div class="col-12 pt-4">
        <button
            class="btn btn-primary w-100"
            @click="pirate.save().then(() => { window.location.href = '{% url 'rest:page:list' %}'; })"
            type="button"
        >
            <i class="bi bi-check-lg"></i> Save
        </button>
    </div>
</div>
