{% extends 'django_spire/infinite_scroll/container.html' %}


{% block container_title %}Pirates{% endblock %}


{% block container_button %}
    <span
        x-data="{
            refreshData() {
                $dispatch('filter-applied')
            }
        }"
        @click="refreshData()"
    >
        <a class="btn btn-sm btn-primary" href="#">
            <i class="bi bi-arrow-repeat"></i>
        </a>
    </span>
{% endblock %}
