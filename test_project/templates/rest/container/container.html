{% extends 'django_spire/core/templates/django_spire/infinite_scroll/container.html' %}


{% block container_title %}Pirates{% endblock %}


{% block container_button %}
    <span
        x-data="{
            refreshData() {
                $dispatch('filter-applied')
            }
        }"
        @click="refreshData()"
    >
        {% include 'django_spire/button/button.html' with button_class='btn-primary' button_icon='bi bi-arrow-repeat' %}
    </span>
{% endblock %}
