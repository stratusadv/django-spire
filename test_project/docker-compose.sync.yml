services:
  sync-tablet-1:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: sync_tablet_1
      POSTGRES_USER: sync
      POSTGRES_PASSWORD: sync
    ports:
      - "5433:5432"
    volumes:
      - sync_tablet_1_data:/var/lib/postgresql/data

  sync-tablet-2:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: sync_tablet_2
      POSTGRES_USER: sync
      POSTGRES_PASSWORD: sync
    ports:
      - "5435:5432"
    volumes:
      - sync_tablet_2_data:/var/lib/postgresql/data

  sync-tablet-3:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: sync_tablet_3
      POSTGRES_USER: sync
      POSTGRES_PASSWORD: sync
    ports:
      - "5436:5432"
    volumes:
      - sync_tablet_3_data:/var/lib/postgresql/data

  sync-tablet-4:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: sync_tablet_4
      POSTGRES_USER: sync
      POSTGRES_PASSWORD: sync
    ports:
      - "5437:5432"
    volumes:
      - sync_tablet_4_data:/var/lib/postgresql/data

  sync-tablet-5:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: sync_tablet_5
      POSTGRES_USER: sync
      POSTGRES_PASSWORD: sync
    ports:
      - "5438:5432"
    volumes:
      - sync_tablet_5_data:/var/lib/postgresql/data

  sync-cloud:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: sync_cloud
      POSTGRES_USER: sync
      POSTGRES_PASSWORD: sync
    ports:
      - "5434:5432"
    volumes:
      - sync_cloud_data:/var/lib/postgresql/data

volumes:
  sync_tablet_1_data:
  sync_tablet_2_data:
  sync_tablet_3_data:
  sync_tablet_4_data:
  sync_tablet_5_data:
  sync_cloud_data:
